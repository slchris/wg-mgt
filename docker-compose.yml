services:
  wg-mgt:
    build:
      context: .
      dockerfile: Dockerfile
    image: wg-mgt:latest
    container_name: wg-mgt
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite database
      - wg-mgt-data:/app/data
      # Mount SSH key for server management (optional)
      # - ~/.ssh/id_rsa:/app/ssh/id_rsa:ro
    environment:
      - WG_MGT_DB_PATH=/app/data/wg-mgt.db
      - WG_MGT_PORT=8080
      - WG_MGT_HOST=0.0.0.0
      - WG_MGT_LOCAL_ONLY=false
      - WG_MGT_JWT_SECRET=${WG_MGT_JWT_SECRET:-change-me-in-production}
      - WG_MGT_ADMIN_USER=${WG_MGT_ADMIN_USER:-admin}
      - WG_MGT_ADMIN_PASS=${WG_MGT_ADMIN_PASS:-admin123}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - wg-mgt-network

volumes:
  wg-mgt-data:
    driver: local

networks:
  wg-mgt-network:
    driver: bridge
