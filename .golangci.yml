version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gocyclo
    - gosec
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell

settings:
  gocyclo:
    min-complexity: 15
  gosec:
    config:
      global:
        audit: enabled

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  print-issued-lines: true
  print-linter-name: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
